<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e1e2f">
<link rel="manifest" href="manifest.json">

<title>Personality Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#1e1e2f,#2e2e42);
color:white;
margin:0;
padding:20px 12px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.pageTitle{
text-align:left;
font-size:26px;
font-weight:700;
margin:6px 0 12px;
letter-spacing:.5px;
}

.title-red{color:#ff6b6b;}
.title-yellow{color:#ffd452;}
.title-green{color:#57ff9a;}
.title-blue{color:#52a8ff;}

.swipeContainer{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;

scroll-snap-stop: always;

touch-action:pan-y pan-x;

scroll-behavior:smooth;

-webkit-overflow-scrolling:touch;
overscroll-behavior-x:contain;

gap:12px;
padding:4px 8px;

align-items:flex-start;
}

.swipeContainer::-webkit-scrollbar{
display:none;
}
  
.page{
min-width:92%;
scroll-snap-align:center;
scroll-snap-stop:always;
flex-shrink:0;
  
display:flex;
flex-direction:column;
justify-content:flex-start;
  
gap:14px;
padding:18px;
  
border-radius:20px;
background:rgba(30,30,47,.75);
  
backdrop-filter:blur(6px);
box-shadow:0 12px 30px rgba(0,0,0,.35);
transition:transform .35s ease, opacity .35s ease;
animation:cardFade .4s ease;

height:auto;
min-height:0;
align-self:flex-start;

transform:scale(.92);
opacity:.65;
}

.page.active{
transform:scale(1);
opacity:1;
}

.page button{
max-width:420px;
margin:10px auto;
display:block;
}

.tabContent{
overflow:hidden;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:16px 0;
}

.tabs button{
flex:1;
min-width:100px;
}
  
.results{
margin-top:20px;
}

.resultRow{
margin:10px 0;
}

.resultLabel{
display:flex;
justify-content:space-between;
font-size:16px;
margin-bottom:6px;
}

.resultBar{
height:16px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin:6px 0 14px;
}

.fill{
height:100%;
width:0%;
transition:width 1.2s ease, box-shadow .6s ease;
}

.fill.red{background:#ff5252}
.fill.yellow{background:#ffd452}
.fill.green{background:#57ff9a}
.fill.blue{background:#52a8ff}

.fill.red{
background:#ff5252;
box-shadow:0 0 12px rgba(255,82,82,.6);
}

.fill.yellow{
background:#ffd452;
box-shadow:0 0 12px rgba(255,212,82,.6);
}

.fill.green{
background:#57ff9a;
box-shadow:0 0 12px rgba(87,255,154,.6);
}

.fill.blue{
background:#52a8ff;
box-shadow:0 0 12px rgba(82,168,255,.6);
}
  
.card{
background:#1e1e2f;
width:100%;
max-width:680px;
padding:20px 18px 18px 18px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
animation:fade .4s ease;
margin:0 auto;
box-sizing:border-box;
}

.theme-red{
background:linear-gradient(135deg,#2b1f22,#5b2b2f);
}

.theme-yellow{
background:linear-gradient(135deg,#2a2408,#4a3c0c);
}

.theme-green{
background:linear-gradient(135deg,#1b2e1f,#203c28);
}

.theme-blue{
background:linear-gradient(135deg,#1b2333,#22304a);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

@keyframes cardFade{
from{
opacity:.6;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
font-size:28px;
line-height:1.3;
margin-top:0;
}

h3{
font-size:18px;
margin-top:10px;
margin-bottom:4px;
font-weight:600;
}

p{
font-size:18px;
line-height:1.6;
}

.question{
font-size:20px;
color:#ffffff;
}

button{
width:100%;
margin:10px 0 4px;
padding:18px;
border-radius:16px;
border:none;
font-size:18px;
cursor:pointer;
background:#2f2f44;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.04);
background:#3c3c5c;
}

.progress{
height:14px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5252,#ffd452,#57ff9a,#52a8ff);
transition:.4s;
}

.analysisBar{
width:100%;
height:14px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin-top:24px;
}

.analysisFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5252,#ffd452,#57ff9a,#52a8ff);
animation:analysisLoad 1.6s ease forwards;
}

@keyframes analysisLoad{
from{width:0%}
to{width:100%}
}

.red{background:#ff5252}
.yellow{background:#ffd452}
.green{background:#57ff9a}
.blue{background:#52a8ff}

small{opacity:.8}

.pageDots{
display:flex;
justify-content:center;
gap:8px;
margin:14px 0 6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#666;
opacity:.5;
transition:.3s;
}

.dot.active{
opacity:1;
background:white;
transform:scale(1.2);
}

.radarWrap{
display:flex;
justify-content:center;
align-items:center;
margin:12px 0 18px 0;
}

.radar{
position:relative;
width:min(220px,60vw);
height:min(220px,60vw);
border-radius:50%;
}

.radarRing{
position:absolute;
border:1px solid rgba(255,255,255,.15);
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.ring1{width:100%;height:100%;}
.ring2{width:70%;height:70%;}
.ring3{width:40%;height:40%;}

.radarLine{
position:absolute;
left:50%;
top:50%;
width:2px;
height:50%;
background:rgba(255,255,255,.2);
transform-origin:bottom center;
}

.radarShape{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

.radarDot{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 8px rgba(255,255,255,.4);
}

.dot-red{background:#ff5252;}
.dot-yellow{background:#ffd452;}
.dot-green{background:#57ff9a;}
.dot-blue{background:#52a8ff;}

.radarLabel{
position:absolute;
font-size:14px;
font-weight:600;
opacity:.9;
}

.label-red{
top:-18px;
left:50%;
transform:translateX(-50%);
color:#ff6b6b;
}

.label-yellow{
right:-45px;
top:50%;
transform:translateY(-50%);
color:#ffd452;
}

.label-green{
bottom:-18px;
left:50%;
transform:translateX(-50%);
color:#57ff9a;
}

.label-blue{
left:-40px;
top:50%;
transform:translateY(-50%);
color:#52a8ff;
}
  
@media (min-width:768px){
.card{padding:40px}
h2{font-size:34px}
p{font-size:20px}
}

.intro{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#1e1e2f;
z-index:1000;
overflow:hidden;
}

.introColor{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
filter:blur(120px);
opacity:.35;
animation:introPulse 3s ease infinite;
}

.introRed{background:#ff5252;left:20%;}
.introYellow{background:#ffd452;right:20%;}
.introGreen{background:#57ff9a;bottom:20%;}
.introBlue{background:#52a8ff;top:20%;}

@keyframes introPulse{
0%{transform:scale(.8);opacity:.2}
50%{transform:scale(1.2);opacity:.45}
100%{transform:scale(.8);opacity:.2}
}

.aura{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
filter:blur(90px);
opacity:.45;
z-index:-1;
left:50%;
top:40%;
transform:translate(-50%,-50%);
pointer-events:none;
  
animation:
auraPulse 6s ease-in-out infinite,
auraDrift 40s linear infinite;
}

.aura-red{background:#ff5252;}
.aura-yellow{background:#ffd452;}
.aura-green{background:#57ff9a;}
.aura-blue{background:#52a8ff;}

@keyframes auraDrift{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes auraPulse{
0%{
opacity:.35;
transform:translate(-50%,-50%) scale(.85);
}
50%{
opacity:.55;
transform:translate(-50%,-50%) scale(1.05);
}
100%{
opacity:.35;
transform:translate(-50%,-50%) scale(.85);
}
}

</style>
</head>

<body>
  
<audio id="revealSound" src="reveal.mp3" preload="auto"></audio>

<div class="card" id="app"></div>
<canvas id="shareCanvas" width="800" height="800" style="display:none"></canvas>
  
<script>

const questions = [
["When starting something new you usually…",
["Jump in immediately","Talk it through excitedly","Make sure everyone’s comfortable","Plan carefully first"]],

["In group situations you tend to…",
["Take the lead","Bring energy and fun","Keep harmony","Organize details"]],

["You feel most frustrated when people…",
["Waste time","Kill enthusiasm","Create conflict","Are careless"]],

["Your decisions are driven mainly by…",
["Speed and results","Emotion and excitement","Peace and relationships","Logic and accuracy"]],

["Under stress you usually…",
["Push harder","Distract yourself","Withdraw quietly","Overthink everything"]],

["You value most…",
["Winning","Freedom","Connection","Correctness"]],

["Your friends see you as…",
["Strong-willed","Fun-loving","Supportive","Smart"]],

["You prefer work that feels…",
["Fast-paced","Creative","Meaningful","Structured"]],

["Your natural pace is…",
["Quick","Spontaneous","Steady","Careful"]],

["Your biggest strength is…",
["Action","Ideas","Loyalty","Logic"]],

["When conflict appears you…",
["Confront it","Lighten it","Avoid it","Analyze it"]],

["You worry most about…",
["Falling behind","Missing out","Hurting others","Making mistakes"]],

["You trust more in…",
["Instincts","Feelings","People","Facts"]],

["Plans should be…",
["Fast","Flexible","Comfortable","Detailed"]],

["Your attention goes toward…",
["Goals","Possibilities","People","Systems"]],

["You feel best when…",
["Achieving","Laughing","Belonging","Prepared"]],

["You dislike…",
["Delays","Boredom","Tension","Errors"]],

["Your energy comes from…",
["Action","Socializing","Stability","Order"]],

["You choose based on…",
["Efficiency","Emotion","Harmony","Logic"]],

["Success means…",
["Results","Experiences","Relationships","Precision"]]
];

const COLORS = ["Red","Yellow","Green","Blue"];

let state={
score:{Red:0,Yellow:0,Green:0,Blue:0},
index:0,
personA:null,
personAvals:null,
result:null,
tab:"Core"
};

const app=document.getElementById("app");

function shuffle(a){
return a.map(v=>[Math.random(),v])
.sort((a,b)=>a[0]-b[0])
.map(v=>v[1]);
}

function showIntro(){

app.innerHTML=`

<div class="intro">

<div class="introColor introRed"></div>
<div class="introColor introYellow"></div>
<div class="introColor introGreen"></div>
<div class="introColor introBlue"></div>

<h1 style="
position:relative;
z-index:2;
font-size:40px;
letter-spacing:1px;
text-align:center;
">
Personality Color Test
</h1>

</div>

`;

setTimeout(()=>{
renderHome();
},2200);

}
  
function renderHome(){

app.innerHTML = `

<div style="text-align:center;padding:30px 10px">

<div style="
font-size:42px;
font-weight:700;
margin-bottom:10px;
">
Personality Color Test
</div>

<p style="
opacity:.8;
max-width:420px;
margin:auto;
margin-bottom:28px;
">
Discover how you communicate, lead, and think based on behavioral patterns.
</p>

<img src="icon-192.png" style="width:90px;margin:20px 0;">

<button onclick="startQuiz()" style="
font-size:20px;
padding:20px;
margin-top:10px;
">
Start Personality Test
</button>

<p style="
opacity:.6;
font-size:14px;
margin-top:20px;
">
20 questions • ~2 minutes
</p>

</div>

`;

}

function startQuiz(){
renderQuestion();
}

function renderQuestion(){

const percent=Math.round(state.index/questions.length*100);
const q=questions[state.index];
const opts=shuffle(q[1].map((t,i)=>({t,c:COLORS[i]})));

app.innerHTML=`
<div class="progress">
<div class="bar" style="width:${percent}%"></div>
</div>

<h3>Question ${state.index+1} of 20</h3>

<p class="question">${q[0]}</p>

${opts.map(o=>`<button onclick="pick('${o.c}')">${o.t}</button>`).join("")}
`;

}

function pick(color){

state.score[color]++;
state.index++;

if(state.index<questions.length){
renderQuestion();
}else{
  
showAnalysisScreen();

setTimeout(()=>{
calculateResult();
},1700);
}

}

function showAnalysisScreen(){

app.innerHTML=`

<div style="text-align:center;padding:40px 20px">

<h2>Analyzing your personality</h2>

<div class="analysisBar">
<div class="analysisFill"></div>
</div>

<p id="analysisText" style="opacity:.8;margin-top:18px">
Evaluating decision patterns...
</p>

</div>

`;

const messages=[
"Evaluating decision patterns...",
"Mapping behavioral tendencies...",
"Comparing emotional responses...",
"Calculating personality balance...",
"Finalizing personality profile..."
];

let i=0;

const interval=setInterval(()=>{

const text=document.getElementById("analysisText");

if(!text) return;

text.innerText=messages[i % messages.length];

i++;

},400);

setTimeout(()=>{
clearInterval(interval);
},1700);

}

function calculateResult(){

const total=questions.length;

const vals=Object.fromEntries(
COLORS.map(c=>[c,Math.round(state.score[c]/total*100)])
);

const sorted=Object.entries(vals).sort((a,b)=>b[1]-a[1]);

let types=[sorted[0][0]];

if(sorted[0][1]<50){
types.push(sorted[1][0]);
if(sorted[2][1]>=20)types.push(sorted[2][0]);
}

state.result={vals,types};
state.tab = "type0";
  
renderResult();

}

function renderResult(){

const {types}=state.result;

const theme = types[0].toLowerCase();
const aura=`
<div class="aura aura-${types[0].toLowerCase()}"></div>
${types[1] ? `<div class="aura aura-${types[1].toLowerCase()}" style="opacity:.25;"></div>` : ""}
`;

app.innerHTML = `
<div class="card theme-${theme}">

${aura}

<h2>${types.join(" / ")}</h2>
<h3 style="text-align:center;opacity:.85;margin-top:-6px;">
${personalityTitle(types)}
</h3>

<div class="swipeContainer">

<div class="page">
${state.personA ? renderDualRadar() : renderRadar()}
${renderScoreBars()}
</div>

${renderColorPages()}

<div class="page">
<h3>Blend Dynamics</h3>
${blendDefinition(types)}
${personalityInsights(types)}
</div>

<div class="page">
${renderCompatibility()}
</div>

</div>

<div class="pageDots" id="dots"></div>

</div>
`;

setTimeout(animateBars,100);

if(!state.personA){
setTimeout(animateRadar,120);
}
setTimeout(playRevealEffect,200);

createDots();
setTimeout(updateCardFocus,60);

if(state.personA){
setTimeout(()=>{
drawCompatibilityChart(state.personAvals,state.result.vals);
},150);
}
  
if(state.personA){
setTimeout(animateDualRadar,150);
}

const container = document.querySelector(".swipeContainer");

if(container && !container.dataset.listener){
container.dataset.listener = "true";

container.addEventListener("scroll", () => {
updateDots();
magneticSnap();
requestAnimationFrame(updateCardFocus);
});
}

}

function renderRadar(){

return `
<div class="radarWrap">
<div class="radar">

<div class="radarRing ring1"></div>
<div class="radarRing ring2"></div>
<div class="radarRing ring3"></div>

<div class="radarLine" style="transform:translateX(-50%) rotate(0deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(90deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(180deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(270deg)"></div>

<!-- LABELS -->
<div class="radarLabel label-red">Red</div>
<div class="radarLabel label-yellow">Yellow</div>
<div class="radarLabel label-green">Green</div>
<div class="radarLabel label-blue">Blue</div>

<svg class="radarShape">

<polygon id="radarPoly"
fill="rgba(82,168,255,.25)"
stroke="#52a8ff"
stroke-width="2"
filter="url(#glow)"/>

<defs>
<filter id="glow">
<feGaussianBlur stdDeviation="3" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>

</svg>

<div class="radarDot dot-red" id="dotRed"></div>
<div class="radarDot dot-yellow" id="dotYellow"></div>
<div class="radarDot dot-green" id="dotGreen"></div>
<div class="radarDot dot-blue" id="dotBlue"></div>

</div>
</div>
`;

}

function renderDualRadar(){

const a = state.personAvals;
const b = state.result.vals;

return `
<div class="radarWrap">
<div class="radar">

<div class="radarRing ring1"></div>
<div class="radarRing ring2"></div>
<div class="radarRing ring3"></div>

<svg class="radarShape">

<polygon id="radarPolyA"
fill="rgba(82,168,255,.25)"
stroke="#52a8ff"
stroke-width="3"/>

<polygon id="radarPolyB"
fill="rgba(255,212,82,.25)"
stroke="#ffd452"
stroke-width="3"/>

</svg>

<div class="radarLine" style="transform:translateX(-50%) rotate(0deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(90deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(180deg)"></div>
<div class="radarLine" style="transform:translateX(-50%) rotate(270deg)"></div>

<div class="radarLabel label-red">Red</div>
<div class="radarLabel label-yellow">Yellow</div>
<div class="radarLabel label-green">Green</div>
<div class="radarLabel label-blue">Blue</div>

</div>
</div>
`;
}

function animateDualRadar(){

if(!state.personAvals) return;
  
const A = state.personAvals;
const B = state.result.vals;

const angles=[270,0,90,180];

const pointsA=[];
const pointsB=[];

["Red","Yellow","Green","Blue"].forEach((c,i)=>{

pointsA.push(placeDotValue(A[c],angles[i]));
pointsB.push(placeDotValue(B[c],angles[i]));

});

document
.getElementById("radarPolyA")
.setAttribute("points",pointsA.join(" "));

document
.getElementById("radarPolyB")
.setAttribute("points",pointsB.join(" "));

}

function placeDotValue(value,angle){

const r=90*(value/100);
const rad=angle*Math.PI/180;

const x=100+Math.cos(rad)*r;
const y=100+Math.sin(rad)*r;

return `${x},${y}`;

}

function animateRadar(){

const {vals}=state.result;

const points=[];

points.push(placeDot("dotRed",vals.Red,270));
points.push(placeDot("dotYellow",vals.Yellow,0));
points.push(placeDot("dotGreen",vals.Green,90));
points.push(placeDot("dotBlue",vals.Blue,180));

drawPolygon(points);

}

function playRevealEffect(){

if(navigator.vibrate){
navigator.vibrate(40);
}

const sound=document.getElementById("revealSound");

if(sound){
sound.currentTime=0;
sound.play().catch(()=>{});
}

}

function placeDot(id,value,angle){

const r=90*(value/100);

const rad=angle*Math.PI/180;

const x=100+Math.cos(rad)*r;
const y=100+Math.sin(rad)*r;

const dot=document.getElementById(id);
if(dot){
dot.style.left=x+"px";
dot.style.top=y+"px";
}

return `${x},${y}`;

}

function drawPolygon(points){

const poly=document.getElementById("radarPoly");

if(!poly) return;

poly.setAttribute("points",points.join(" "));

}

function createDots(){

const container=document.querySelector(".swipeContainer");
const dots=document.getElementById("dots");

const pages=container.querySelectorAll(".page");

dots.innerHTML="";

pages.forEach((_,i)=>{
dots.innerHTML+=`<div class="dot ${i===0?"active":""}"></div>`;
});

}

function updateDots(){

const container=document.querySelector(".swipeContainer");
const dots=document.querySelectorAll(".dot");

const page = container.querySelector(".page");
if(!page) return;

const pageWidth = page.offsetWidth + 12;
const index=Math.round(container.scrollLeft/pageWidth);

dots.forEach(d=>d.classList.remove("active"));

if(dots[index]){
dots[index].classList.add("active");
}

}

function updateCardFocus(){

const container=document.querySelector(".swipeContainer");
const pages=document.querySelectorAll(".page");

pages.forEach(page=>{

const box=page.getBoundingClientRect();
const pageCenter=box.left + box.width/2;

const containerCenter = container.getBoundingClientRect().left + container.clientWidth/2;
const distance = Math.abs(pageCenter - containerCenter);
if(distance < box.width/2){
page.classList.add("active");
}else{
page.classList.remove("active");
}

});

}

let snapTimeout;

function magneticSnap(){

const container=document.querySelector(".swipeContainer");
const page = container.querySelector(".page");

if(!page) return;

clearTimeout(snapTimeout);

snapTimeout=setTimeout(()=>{

const pageWidth = page.offsetWidth + 12;
const index = Math.round(container.scrollLeft/pageWidth);

container.scrollTo({
left:index*pageWidth,
behavior:"smooth"
});

},80);

}

function renderScoreBars(){

const {vals} = state.result;

return `
<div class="results">

${Object.entries(vals).map(([color,value])=>`

<div class="resultRow">

<div class="resultLabel">
<span>${color}</span>
<span>${value}%</span>
</div>

<div class="resultBar">
<div class="fill ${color.toLowerCase()}" style="width:${value}%"></div>
</div>

</div>

`).join("")}

</div>
`;

}

function renderColorPages(){

const {types}=state.result;

function compatibilityScore(a,b){

let score=50;

if(a[0]===b[0])score+=10;
if(a.includes("Green")&&b.includes("Red"))score+=15;
if(a.includes("Blue")&&b.includes("Yellow"))score+=15;

return Math.max(10,Math.min(100,score));

}

function compatibilityExplanation(percent){

if(percent>85)return"🔥 Strong emotional rhythm alignment.";

if(percent>65)return"💛 Healthy dynamic with growth potential.";

if(percent>45)return"⚖️ Moderate compatibility.";

return"⚡ High friction pairing.";

}

function shareResult(){

const canvas=document.getElementById("shareCanvas");
const ctx=canvas.getContext("2d");

const {types,vals}=state.result;

const title=types.join(" / ");
const subtitle=personalityTitle(types);

/* background */

ctx.fillStyle="#1e1e2f";
ctx.fillRect(0,0,800,800);

/* title */

ctx.fillStyle="white";
ctx.font="bold 48px system-ui";
ctx.textAlign="center";
ctx.fillText("Personality Result",400,120);

/* result */

ctx.font="bold 40px system-ui";
ctx.fillText(title,400,200);
ctx.fillText(subtitle,400,250);

ctx.font="26px system-ui";
ctx.fillStyle="#aab4ff";

/* radar chart center */

const cx=400;
const cy=380;
const maxR=120;

/* radar grid */

ctx.strokeStyle="rgba(255,255,255,.2)";
ctx.lineWidth=1;

[40,80,120].forEach(r=>{
ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.stroke();
});

/* axis lines */

for(let i=0;i<4;i++){

const angle=(Math.PI/2)*i-Math.PI/2;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(
cx+Math.cos(angle)*maxR,
cy+Math.sin(angle)*maxR
);
ctx.stroke();

}

/* calculate points */

const values=[
vals.Red,
vals.Yellow,
vals.Green,
vals.Blue
];

const angles=[
-Math.PI/2,
0,
Math.PI/2,
Math.PI
];

const points=[];

values.forEach((v,i)=>{

const r=maxR*(v/100);

points.push({
x:cx+Math.cos(angles[i])*r,
y:cy+Math.sin(angles[i])*r
});

});

/* draw polygon */

ctx.fillStyle="rgba(82,168,255,.35)";
ctx.strokeStyle="#52a8ff";
ctx.lineWidth=3;

ctx.beginPath();

points.forEach((p,i)=>{
if(i===0) ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
});

ctx.closePath();
ctx.fill();
ctx.stroke();

/* labels */

const labels=["Red","Yellow","Green","Blue"];

labels.forEach((label,i)=>{

ctx.fillStyle="white";
ctx.font="18px system-ui";

ctx.fillText(
label,
cx+Math.cos(angles[i])*(maxR+30)-20,
cy+Math.sin(angles[i])*(maxR+30)
);

});

/* bars */

const colors={
Red:"#ff5252",
Yellow:"#ffd452",
Green:"#57ff9a",
Blue:"#52a8ff"
};

let y=600;

Object.entries(vals).forEach(([color,value])=>{

ctx.fillStyle="white";
ctx.font="22px system-ui";
ctx.fillText(`${color} ${value}%`,300,y);

ctx.fillStyle=colors[color];
ctx.fillRect(420,y-16,value*2.5,18);

y+=50;

});

/* export */

canvas.toBlob(async blob=>{

const file=new File([blob],"personality-result.png",{type:"image/png"});

if(navigator.share){
await navigator.share({
title:"My Personality Result",
files:[file]
});
}else{
const url=URL.createObjectURL(blob);
window.open(url);
}

});

}
