<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e1e2f">
<link rel="manifest" href="manifest.json">

<title>Personality Quiz</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#1e1e2f,#2e2e42);
color:white;
margin:0;
padding:20px 12px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.results{
margin:6px 0 12px 0;
}

.swipeContainer{
display:flex;
transition:transform .35s ease;
}

.swipeContainer{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.pageTitle{
text-align:center;
font-size:26px;
font-weight:700;
margin:6px 0 8px;
letter-spacing:.5px;
}

.title-red{color:#ff6b6b;}
.title-yellow{color:#ffd452;}
.title-green{color:#57ff9a;}
.title-blue{color:#52a8ff;}

.swipeContainer{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
-webkit-overflow-scrolling:touch;
overscroll-behavior-x:contain;
}

.page{
min-width:100%;
scroll-snap-align:center;
display:flex;
flex-direction:column;
justify-content:flex-start;
gap:14px;
padding:10px 0;
}

.tabContent{
overflow:hidden;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:16px 0;
}

.tabs button{
flex:1;
min-width:100px;
}
  
.results{
margin-top:20px;
}

.resultRow{
margin:10px 0;
}

.resultLabel{
display:flex;
justify-content:space-between;
font-size:16px;
margin-bottom:6px;
}

.resultBar{
height:14px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
transition:width 1.2s ease, box-shadow .6s ease;
}

.fill.red{background:#ff5252}
.fill.yellow{background:#ffd452}
.fill.green{background:#57ff9a}
.fill.blue{background:#52a8ff}

.fill.red{
background:#ff5252;
box-shadow:0 0 12px rgba(255,82,82,.6);
}

.fill.yellow{
background:#ffd452;
box-shadow:0 0 12px rgba(255,212,82,.6);
}

.fill.green{
background:#57ff9a;
box-shadow:0 0 12px rgba(87,255,154,.6);
}

.fill.blue{
background:#52a8ff;
box-shadow:0 0 12px rgba(82,168,255,.6);
}
  
.card{
background:#1e1e2f;
width:100%;
max-width:680px;
padding:20px 18px 18px 18px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
animation:fade .4s ease;
margin:0 auto;
box-sizing:border-box;
}

.theme-red{
background:linear-gradient(135deg,#2b1f22,#5b2b2f);
}

.theme-yellow{
background:linear-gradient(135deg,#2a2408,#4a3c0c);
}

.theme-green{
background:linear-gradient(135deg,#1b2e1f,#203c28);
}

.theme-blue{
background:linear-gradient(135deg,#1b2333,#22304a);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

h2{
font-size:28px;
line-height:1.3;
margin-top:0;
}

h3{
font-size:18px;
margin-top:10px;
margin-bottom:4px;
font-weight:600;
}

p{
font-size:18px;
line-height:1.6;
}

.question{
font-size:20px;
color:#ffffff;
}

button{
width:100%;
margin:10px 0 4px;
padding:18px;
border-radius:16px;
border:none;
font-size:18px;
cursor:pointer;
background:#2f2f44;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.04);
background:#3c3c5c;
}

.progress{
height:14px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5252,#ffd452,#57ff9a,#52a8ff);
transition:.4s;
}

.resultBar{
height:16px;
border-radius:10px;
background:#333;
overflow:hidden;
margin:6px 0 14px;
}

.fill{
height:100%;
width:0%;
transition:1s;
}

.red{background:#ff5252}
.yellow{background:#ffd452}
.green{background:#57ff9a}
.blue{background:#52a8ff}

small{opacity:.8}

.pageDots{
display:flex;
justify-content:center;
gap:8px;
margin:14px 0 6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#666;
opacity:.5;
transition:.3s;
}

.dot.active{
opacity:1;
background:white;
transform:scale(1.2);
}

.radarWrap{
display:flex;
justify-content:center;
align-items:center;
margin:12px 0 18px 0;
}

.radar{
position:relative;
width:200px;
height:200px;
border-radius:50%;
}

.radarRing{
position:absolute;
border:1px solid rgba(255,255,255,.15);
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.ring1{width:200px;height:200px;}
.ring2{width:140px;height:140px;}
.ring3{width:80px;height:80px;}

.radarLine{
position:absolute;
left:50%;
top:50%;
width:2px;
height:100px;
background:rgba(255,255,255,.2);
transform-origin:bottom center;
}

.radarShape{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

.radarDot{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 8px rgba(255,255,255,.4);
}

.dot-red{background:#ff5252;}
.dot-yellow{background:#ffd452;}
.dot-green{background:#57ff9a;}
.dot-blue{background:#52a8ff;}
  
@media (min-width:768px){
.card{padding:40px}
h2{font-size:34px}
p{font-size:20px}
}

</style>
</head>

<body>

<div class="card" id="app"></div>

<script>

const questions = [
["When starting something new you usually…",
["Jump in immediately","Talk it through excitedly","Make sure everyone’s comfortable","Plan carefully first"]],

["In group situations you tend to…",
["Take the lead","Bring energy and fun","Keep harmony","Organize details"]],

["You feel most frustrated when people…",
["Waste time","Kill enthusiasm","Create conflict","Are careless"]],

["Your decisions are driven mainly by…",
["Speed and results","Emotion and excitement","Peace and relationships","Logic and accuracy"]],

["Under stress you usually…",
["Push harder","Distract yourself","Withdraw quietly","Overthink everything"]],

["You value most…",
["Winning","Freedom","Connection","Correctness"]],

["Your friends see you as…",
["Strong-willed","Fun-loving","Supportive","Smart"]],

["You prefer work that feels…",
["Fast-paced","Creative","Meaningful","Structured"]],

["Your natural pace is…",
["Quick","Spontaneous","Steady","Careful"]],

["Your biggest strength is…",
["Action","Ideas","Loyalty","Logic"]],

["When conflict appears you…",
["Confront it","Lighten it","Avoid it","Analyze it"]],

["You worry most about…",
["Falling behind","Missing out","Hurting others","Making mistakes"]],

["You trust more in…",
["Instincts","Feelings","People","Facts"]],

["Plans should be…",
["Fast","Flexible","Comfortable","Detailed"]],

["Your attention goes toward…",
["Goals","Possibilities","People","Systems"]],

["You feel best when…",
["Achieving","Laughing","Belonging","Prepared"]],

["You dislike…",
["Delays","Boredom","Tension","Errors"]],

["Your energy comes from…",
["Action","Socializing","Stability","Order"]],

["You choose based on…",
["Efficiency","Emotion","Harmony","Logic"]],

["Success means…",
["Results","Experiences","Relationships","Precision"]]
];

const COLORS = ["Red","Yellow","Green","Blue"];

let state={
score:{Red:0,Yellow:0,Green:0,Blue:0},
index:0,
personA:null,
result:null,
tab:"Core"
};

const app=document.getElementById("app");

function shuffle(a){
return a.map(v=>[Math.random(),v])
.sort((a,b)=>a[0]-b[0])
.map(v=>v[1]);
}

function renderQuestion(){

const percent=Math.round(state.index/questions.length*100);
const q=questions[state.index];
const opts=shuffle(q[1].map((t,i)=>({t,c:COLORS[i]})));

app.innerHTML=`
<div class="progress">
<div class="bar" style="width:${percent}%"></div>
</div>

<h3>Question ${state.index+1} of 20</h3>

<p class="question">${q[0]}</p>

${opts.map(o=>`<button onclick="pick('${o.c}')">${o.t}</button>`).join("")}
`;

}

function pick(color){

state.score[color]++;
state.index++;

if(state.index<questions.length){
renderQuestion();
}else{
calculateResult();
}

}

function calculateResult(){

const total=questions.length;

const vals=Object.fromEntries(
COLORS.map(c=>[c,Math.round(state.score[c]/total*100)])
);

const sorted=Object.entries(vals).sort((a,b)=>b[1]-a[1]);

let types=[sorted[0][0]];

if(sorted[0][1]<50){
types.push(sorted[1][0]);
if(sorted[2][1]>=20)types.push(sorted[2][0]);
}

state.result={vals,types};
state.tab = "type0";
  
renderResult();

}

function renderResult(){

const {types}=state.result;

const theme = types[0].toLowerCase();

app.innerHTML = `
<div class="card theme-${theme}">
<h2>${types.join(" / ")}</h2>

<div class="swipeContainer">

<div class="page">
${renderRadar()}
${renderScoreBars()}
</div>

${renderColorPages()}

<div class="page">
<h3>Blend Dynamics</h3>
${blendDefinition(types)}
</div>

<div class="page">
${renderCompatibility()}
</div>

</div>

</div class="pageDots" id="dots"></div>

</div>
`;

setTimeout(animateBars,100);
setTimeout(animateRadar,120);
createDots();

const container=document.querySelector(".swipeContainer");
container.addEventListener("scroll",updateDots);

}

function renderRadar(){
function renderRadar(){

return `
<div class="radarWrap">
<div class="radar">

<div class="radarRing ring1"></div>
<div class="radarRing ring2"></div>
<div class="radarRing ring3"></div>

<div class="radarLine" style="transform:rotate(0deg)"></div>
<div class="radarLine" style="transform:rotate(90deg)"></div>
<div class="radarLine" style="transform:rotate(180deg)"></div>
<div class="radarLine" style="transform:rotate(270deg)"></div>

<svg class="radarShape">
<polygon id="radarPoly"
fill="rgba(82,168,255,.25)"
stroke="#52a8ff"
stroke-width="2"/>
</svg>

<div class="radarDot dot-red" id="dotRed"></div>
<div class="radarDot dot-yellow" id="dotYellow"></div>
<div class="radarDot dot-green" id="dotGreen"></div>
<div class="radarDot dot-blue" id="dotBlue"></div>

</div>
</div>
`;

}

function animateRadar(){

const {vals}=state.result;

const points=[];

points.push(placeDot("dotRed",vals.Red,270));
points.push(placeDot("dotYellow",vals.Yellow,0));
points.push(placeDot("dotGreen",vals.Green,90));
points.push(placeDot("dotBlue",vals.Blue,180));

drawPolygon(points);

}

function placeDot(id,value,angle){

const r=90*(value/100);

const rad=angle*Math.PI/180;

const x=100+Math.cos(rad)*r;
const y=100+Math.sin(rad)*r;

const dot=document.getElementById(id);

dot.style.left=x+"px";
dot.style.top=y+"px";

return `${x},${y}`;

}

function drawPolygon(points){

const poly=document.getElementById("radarPoly");

poly.setAttribute("points",points.join(" "));

}

function createDots(){

const container=document.querySelector(".swipeContainer");
const dots=document.getElementById("dots");

const pages=container.querySelectorAll(".page");

dots.innerHTML="";

pages.forEach((_,i)=>{
dots.innerHTML+=`<div class="dot ${i===0?"active":""}"></div>`;
});

}

function updateDots(){

const container=document.querySelector(".swipeContainer");
const dots=document.querySelectorAll(".dot");

const pageWidth=container.clientWidth;
const index=Math.round(container.scrollLeft/pageWidth);

dots.forEach(d=>d.classList.remove("active"));

if(dots[index]){
dots[index].classList.add("active");
}

}

function renderScoreBars(){

const {vals} = state.result;

return `
<div class="results">

${Object.entries(vals).map(([color,value])=>`

<div class="resultRow">

<div class="resultLabel">
<span>${color}</span>
<span>${value}%</span>
</div>

<div class="resultBar">
<div class="fill ${color.toLowerCase()}" style="width:${value}%"></div>
</div>

</div>

`).join("")}

</div>
`;

}

function renderColorPages(){

const {types}=state.result;

return types.map(color => `
<div class="page theme-${color.toLowerCase()}">

<div class="pageTitle title-${color.toLowerCase()}">${color}</div>

${coreDefinition(color)}

</div>
`).join("");

}
  
function animateBars(){

const bars=document.querySelectorAll(".fill");

bars.forEach(bar=>{

const target=bar.style.width;

bar.style.width="0%";

setTimeout(()=>{
bar.style.width=target;
},100);

});

}
  
function renderTabContent(){

const {types,vals}=state.result;

let pages=[];

/* PAGE 1 — Results Overview */

pages.push(`
<div class="swipePage">
<h3>Your Personality Breakdown</h3>
${renderScoreBars()}
</div>
`);

/* PAGE 2+ — Personality Pages */

types.forEach(color=>{
pages.push(`
<div class="swipePage theme-${color.toLowerCase()}">
<h3>${color}</h3>
${coreDefinition(color)}
</div>
`);
});

/* Blend Page */

pages.push(`
<div class="swipePage">
<h3>Blend Dynamics</h3>
${blendDefinition(types)}
</div>
`);

/* Compatibility Page */

pages.push(`
<div class="swipePage">
<button onclick="savePersonA()">Compare With Someone</button>
</div>
`);

return pages.join("");

}

function renderCompatibility(){

<div class="page">
${renderCompatibility()}
<button onclick="restart()">Restart</button>
</div>
  
if(state.personA){

const percent=compatibilityScore(state.personA,state.result.types);

return `
<h3>${percent}% Match</h3>
${compatibilityExplanation(percent)}
`;

}

return `<button onclick="savePersonA()">Compare With Someone</button>`;

}

function savePersonA(){
state.personA=state.result.types;
restart(true);
}

function restart(second=false){

state.score={Red:0,Yellow:0,Green:0,Blue:0};
state.index=0;
state.result=null;

if(second){
app.innerHTML=`<h2>Person B</h2><button onclick="renderQuestion()">Start</button>`;
}else{
renderQuestion();
}

}

function compatibilityScore(a,b){

let score=50;

if(a[0]===b[0])score+=10;
if(a.includes("Green")&&b.includes("Red"))score+=15;
if(a.includes("Blue")&&b.includes("Yellow"))score+=15;

return Math.max(10,Math.min(100,score));

}

function compatibilityExplanation(percent){

if(percent>85)return"🔥 Strong emotional rhythm alignment.";

if(percent>65)return"💛 Healthy dynamic with growth potential.";

if(percent>45)return"⚖️ Moderate compatibility.";

return"⚡ High friction pairing.";

}

function coreDefinition(color){

const defs = {

Red: `
<h3>Core Motivation</h3>
<p>Achievement, control, progress, and measurable results.</p>

<h3>Strengths</h3>
<p>Decisive, confident, competitive, action-oriented, resilient under pressure.</p>

<h3>Under Stress</h3>
<p>Can become impatient, blunt, controlling, or overly forceful.</p>

<h3>Communication Style</h3>
<p>Direct, efficient, and focused on results.</p>

<h3>Leadership Style</h3>
<p>Commanding, goal-driven, and decisive.</p>

<h3>Relationship Needs</h3>
<p>Respect, independence, and loyalty.</p>
`,

Yellow: `
<h3>Core Motivation</h3>
<p>Connection, excitement, recognition, and emotional expression.</p>

<h3>Strengths</h3>
<p>Charismatic, optimistic, persuasive, energetic, imaginative.</p>

<h3>Under Stress</h3>
<p>Can become scattered, overly emotional, or avoid responsibility.</p>

<h3>Communication Style</h3>
<p>Expressive, enthusiastic, and storytelling-driven.</p>

<h3>Leadership Style</h3>
<p>Inspirational and motivational.</p>

<h3>Relationship Needs</h3>
<p>Attention, affection, and appreciation.</p>
`,

Green: `
<h3>Core Motivation</h3>
<p>Harmony, stability, and emotional safety.</p>

<h3>Strengths</h3>
<p>Patient, loyal, empathetic, dependable, calm under pressure.</p>

<h3>Under Stress</h3>
<p>Withdraws, avoids confrontation, suppresses emotions.</p>

<h3>Communication Style</h3>
<p>Gentle, supportive, and careful.</p>

<h3>Leadership Style</h3>
<p>Supportive and steady.</p>

<h3>Relationship Needs</h3>
<p>Security, consistency, and trust.</p>
`,

Blue: `
<h3>Core Motivation</h3>
<p>Accuracy, logic, understanding, and precision.</p>

<h3>Strengths</h3>
<p>Analytical, detail-oriented, strategic, disciplined.</p>

<h3>Under Stress</h3>
<p>Overthinks, becomes critical, emotionally distant.</p>

<h3>Communication Style</h3>
<p>Logical, structured, fact-based.</p>

<h3>Leadership Style</h3>
<p>Strategic and system-focused.</p>

<h3>Relationship Needs</h3>
<p>Intellectual respect, trust, and reliability.</p>
`
};

return defs[color];

}

function blendDefinition(types){

const [a,b,c] = types;

if(types.length === 1){
return `
<p>Your personality is strongly centered in <b>${a}</b>. This means your motivations, decisions, and reactions tend to follow a consistent internal pattern.</p>
`;
}

if(types.length === 2){
return `
<p>Your personality is primarily driven by <b>${a}</b> with strong influence from <b>${b}</b>.</p>

<p>This means your natural instincts from ${a} are often balanced by the perspective and behavioral style of ${b}. In some situations you may lead with the drive of ${a}, while in others the tendencies of ${b} shape how you respond.</p>

<p>This combination often creates a personality that can operate effectively in both structured and dynamic environments.</p>
`;
}

if(types.length === 3){
return `
<p>Your personality contains a layered blend of <b>${a}</b>, <b>${b}</b>, and <b>${c}</b>.</p>

<p>${a} tends to guide your core decision making, ${b} influences how you interact with people, and ${c} shapes how you internally process situations.</p>

<p>This gives you a flexible personality structure where different traits may appear depending on the environment.</p>

<p>People with this blend often appear complex to others because different parts of their personality emerge in different situations.</p>
`;
}

}
  
renderQuestion();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
