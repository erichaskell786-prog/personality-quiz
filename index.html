<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e1e2f">
<link rel="manifest" href="manifest.json">

<title>Personality Quiz</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#1e1e2f,#2e2e42);
color:white;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#1e1e2f;
width:100%;
max-width:680px;
padding:28px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

h2{
font-size:28px;
line-height:1.3;
margin-top:0;
}

h3{
font-size:20px;
margin-top:0;
}

p{
font-size:18px;
line-height:1.6;
}

.question{
font-size:20px;
color:#ffffff;
}

button{
width:100%;
margin:12px 0;
padding:18px;
border-radius:16px;
border:none;
font-size:18px;
cursor:pointer;
background:#2f2f44;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.04);
background:#3c3c5c;
}

.progress{
height:14px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5252,#ffd452,#57ff9a,#52a8ff);
transition:.4s;
}

.resultBar{
height:16px;
border-radius:10px;
background:#333;
overflow:hidden;
margin:6px 0 14px;
}

.fill{
height:100%;
width:0%;
transition:1s;
}

.red{background:#ff5252}
.yellow{background:#ffd452}
.green{background:#57ff9a}
.blue{background:#52a8ff}

small{opacity:.8}

@media (min-width:768px){
.card{padding:40px}
h2{font-size:34px}
p{font-size:20px}
}

</style>
</head>

<body>

<div class="card" id="app"></div>

<script>

const questions = [
["When starting something new you usually…",
["Jump in immediately","Talk it through excitedly","Make sure everyone’s comfortable","Plan carefully first"]],

["In group situations you tend to…",
["Take the lead","Bring energy and fun","Keep harmony","Organize details"]],

["You feel most frustrated when people…",
["Waste time","Kill enthusiasm","Create conflict","Are careless"]],

["Your decisions are driven mainly by…",
["Speed and results","Emotion and excitement","Peace and relationships","Logic and accuracy"]],

["Under stress you usually…",
["Push harder","Distract yourself","Withdraw quietly","Overthink everything"]],

["You value most…",
["Winning","Freedom","Connection","Correctness"]],

["Your friends see you as…",
["Strong-willed","Fun-loving","Supportive","Smart"]],

["You prefer work that feels…",
["Fast-paced","Creative","Meaningful","Structured"]],

["Your natural pace is…",
["Quick","Spontaneous","Steady","Careful"]],

["Your biggest strength is…",
["Action","Ideas","Loyalty","Logic"]],

["When conflict appears you…",
["Confront it","Lighten it","Avoid it","Analyze it"]],

["You worry most about…",
["Falling behind","Missing out","Hurting others","Making mistakes"]],

["You trust more in…",
["Instincts","Feelings","People","Facts"]],

["Plans should be…",
["Fast","Flexible","Comfortable","Detailed"]],

["Your attention goes toward…",
["Goals","Possibilities","People","Systems"]],

["You feel best when…",
["Achieving","Laughing","Belonging","Prepared"]],

["You dislike…",
["Delays","Boredom","Tension","Errors"]],

["Your energy comes from…",
["Action","Socializing","Stability","Order"]],

["You choose based on…",
["Efficiency","Emotion","Harmony","Logic"]],

["Success means…",
["Results","Experiences","Relationships","Precision"]]
];

const COLORS = ["Red","Yellow","Green","Blue"];

let state={
score:{Red:0,Yellow:0,Green:0,Blue:0},
index:0,
personA:null,
result:null,
tab:"Core"
};

const app=document.getElementById("app");

function shuffle(a){
return a.map(v=>[Math.random(),v])
.sort((a,b)=>a[0]-b[0])
.map(v=>v[1]);
}

function renderQuestion(){

const percent=Math.round(state.index/questions.length*100);
const q=questions[state.index];
const opts=shuffle(q[1].map((t,i)=>({t,c:COLORS[i]})));

app.innerHTML=`
<div class="progress">
<div class="bar" style="width:${percent}%"></div>
</div>

<h3>Question ${state.index+1} of 20</h3>

<p class="question">${q[0]}</p>

${opts.map(o=>`<button onclick="pick('${o.c}')">${o.t}</button>`).join("")}
`;

}

function pick(color){

state.score[color]++;
state.index++;

if(state.index<questions.length){
renderQuestion();
}else{
calculateResult();
}

}

function calculateResult(){

const total=questions.length;

const vals=Object.fromEntries(
COLORS.map(c=>[c,Math.round(state.score[c]/total*100)])
);

const sorted=Object.entries(vals).sort((a,b)=>b[1]-a[1]);

let types=[sorted[0][0]];

if(sorted[0][1]<50){
types.push(sorted[1][0]);
if(sorted[2][1]>=20)types.push(sorted[2][0]);
}

state.result={vals,types};

renderResult();

}

function renderTabs(){

return`
<div class="tabs">

${["Core","Secondary","Blend","Compatibility"].map(t=>

`<button class="${state.tab===t?"activeTab":""}"
onclick="switchTab('${t}')">${t}</button>`

).join("")}

</div>
`;

}

function switchTab(tab){
state.tab=tab;
renderResult();
}

function renderResult(){

const {types}=state.result;

app.innerHTML=`

<h2>${types.join(" / ")}</h2>

${renderTabs()}

<div class="tabContent">
${renderTabContent()}
</div>

<button onclick="restart()">Restart</button>

`;

enableSwipe();

}

function renderTabContent(){

const {types}=state.result;

if(state.tab==="Core"){
return`<h3>${types[0]}</h3><p>${coreDefinition(types[0])}</p>`;
}

if(state.tab==="Secondary"){

if(types.length>1){
return`<h3>${types[1]}</h3><p>${coreDefinition(types[1])}</p>`;
}

return"<p>No strong secondary influence.</p>";

}

if(state.tab==="Blend"){
return`<h3>Blend Dynamics</h3><p>${blendDefinition(types)}</p>`;
}

if(state.tab==="Compatibility"){

if(state.personA){

const percent=compatibilityScore(state.personA,types);

return`
<h3>${percent}% Match</h3>
<p>${compatibilityExplanation(percent)}</p>
`;

}

return`<button onclick="savePersonA()">Compare With Someone</button>`;

}

}

function savePersonA(){
state.personA=state.result.types;
restart(true);
}

function restart(second=false){

state.score={Red:0,Yellow:0,Green:0,Blue:0};
state.index=0;
state.result=null;

if(second){
app.innerHTML=`<h2>Person B</h2><button onclick="renderQuestion()">Start</button>`;
}else{
renderQuestion();
}

}

function compatibilityScore(a,b){

let score=50;

if(a[0]===b[0])score+=10;
if(a.includes("Green")&&b.includes("Red"))score+=15;
if(a.includes("Blue")&&b.includes("Yellow"))score+=15;

return Math.max(10,Math.min(100,score));

}

function compatibilityExplanation(percent){

if(percent>85)return"🔥 Strong emotional rhythm alignment.";

if(percent>65)return"💛 Healthy dynamic with growth potential.";

if(percent>45)return"⚖️ Moderate compatibility.";

return"⚡ High friction pairing.";

}

function coreDefinition(color){

const defs = {

Red: `
<h3>Core Motivation</h3>
<p>Achievement, control, progress, and measurable results.</p>

<h3>Strengths</h3>
<p>Decisive, confident, competitive, action-oriented, resilient under pressure.</p>

<h3>Under Stress</h3>
<p>Can become impatient, blunt, controlling, or overly forceful.</p>

<h3>Communication Style</h3>
<p>Direct, efficient, and focused on results.</p>

<h3>Leadership Style</h3>
<p>Commanding, goal-driven, and decisive.</p>

<h3>Relationship Needs</h3>
<p>Respect, independence, and loyalty.</p>
`,

Yellow: `
<h3>Core Motivation</h3>
<p>Connection, excitement, recognition, and emotional expression.</p>

<h3>Strengths</h3>
<p>Charismatic, optimistic, persuasive, energetic, imaginative.</p>

<h3>Under Stress</h3>
<p>Can become scattered, overly emotional, or avoid responsibility.</p>

<h3>Communication Style</h3>
<p>Expressive, enthusiastic, and storytelling-driven.</p>

<h3>Leadership Style</h3>
<p>Inspirational and motivational.</p>

<h3>Relationship Needs</h3>
<p>Attention, affection, and appreciation.</p>
`,

Green: `
<h3>Core Motivation</h3>
<p>Harmony, stability, and emotional safety.</p>

<h3>Strengths</h3>
<p>Patient, loyal, empathetic, dependable, calm under pressure.</p>

<h3>Under Stress</h3>
<p>Withdraws, avoids confrontation, suppresses emotions.</p>

<h3>Communication Style</h3>
<p>Gentle, supportive, and careful.</p>

<h3>Leadership Style</h3>
<p>Supportive and steady.</p>

<h3>Relationship Needs</h3>
<p>Security, consistency, and trust.</p>
`,

Blue: `
<h3>Core Motivation</h3>
<p>Accuracy, logic, understanding, and precision.</p>

<h3>Strengths</h3>
<p>Analytical, detail-oriented, strategic, disciplined.</p>

<h3>Under Stress</h3>
<p>Overthinks, becomes critical, emotionally distant.</p>

<h3>Communication Style</h3>
<p>Logical, structured, fact-based.</p>

<h3>Leadership Style</h3>
<p>Strategic and system-focused.</p>

<h3>Relationship Needs</h3>
<p>Intellectual respect, trust, and reliability.</p>
`
};

return defs[color];

}

function blendDefinition(types){

if(types.length===1){
return"Your personality is strongly centered.";
}

if(types.length===2){
return`${types[0]} drives your core behavior while ${types[1]} shapes how you express it.`;
}

return"You have a flexible multi-layered personality blend.";

}

function enableSwipe(){

let startX=null;

const content=document.querySelector(".tabContent");

content.addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});

content.addEventListener("touchend",e=>{

const endX=e.changedTouches[0].screenX;

if(startX-endX>50)nextTab();
if(endX-startX>50)prevTab();

});

}

function nextTab(){
const tabs=["Core","Secondary","Blend","Compatibility"];
let i=tabs.indexOf(state.tab);
state.tab=tabs[(i+1)%tabs.length];
renderResult();
}

function prevTab(){
const tabs=["Core","Secondary","Blend","Compatibility"];
let i=tabs.indexOf(state.tab);
state.tab=tabs[(i-1+tabs.length)%tabs.length];
renderResult();
}

renderQuestion();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
