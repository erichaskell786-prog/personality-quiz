<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2f">
<meta charset="UTF-8">
<title>Personality Quiz</title>
<style>
body{
font-family:system-ui;
background:linear-gradient(135deg,#1e1e2f,#2e2e42);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.card{
background:#111827;
width:92%;
max-width:650px;
padding:25px;
border-radius:22px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
animation:fade .4s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
h2,h3{margin-top:0}
button{
width:100%;
margin:8px 0;
padding:14px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
background:#2f2f44;
color:white;
transition:.2s;
}
button:hover{transform:scale(1.04);background:#3c3c5c}
.progress{
height:10px;
background:#2a2a3c;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5252,#ffd452,#57ff9a,#52a8ff);
transition:.4s;
}
.resultBar{
height:12px;
border-radius:10px;
background:#333;
overflow:hidden;
margin:6px 0 14px;
}
.fill{
height:100%;
width:0%;
transition:1s;
}
.red{background:#ff5252}
.yellow{background:#ffd452}
.green{background:#57ff9a}
.blue{background:#52a8ff}
small{opacity:.8}
</style>
</head>
<body>

<div class="card" id="app"></div>

<script>
const questions = [/* keep your same 20 questions array here exactly as before */];

const COLORS = ["Red","Yellow","Green","Blue"];

let state = {
  score: {Red:0,Yellow:0,Green:0,Blue:0},
  index: 0,
  personA: null,
  result: null,
  tab: "Core"
};

const app = document.getElementById("app");

function shuffle(a){return a.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);}

function renderQuestion(){
  const percent = Math.round(state.index/questions.length*100);
  const q = questions[state.index];
  const opts = shuffle(q[1].map((t,i)=>({t,c:COLORS[i]})));

  app.innerHTML = `
  <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
  <h3>Question ${state.index+1} of 20</h3>
  <p>${q[0]}</p>
  ${opts.map(o=>`<button onclick="pick('${o.c}')">${o.t}</button>`).join("")}
  `;
}

function pick(color){
  state.score[color]++;
  state.index++;
  if(state.index<questions.length){
    renderQuestion();
  } else {
    calculateResult();
  }
}

function calculateResult(){
  const total = questions.length;
  const vals = Object.fromEntries(
    COLORS.map(c=>[c,Math.round(state.score[c]/total*100)])
  );

  const sorted = Object.entries(vals).sort((a,b)=>b[1]-a[1]);

  let types = [sorted[0][0]];
  if(sorted[0][1] < 50){
    types.push(sorted[1][0]);
    if(sorted[2][1] >= 20) types.push(sorted[2][0]);
  }

  state.result = {vals, types};
  renderResult();
}

function renderTabs(){
  return `
  <div class="tabs">
    ${["Core","Secondary","Blend","Compatibility"].map(t=>
      `<button class="${state.tab===t?"activeTab":""}" onclick="switchTab('${t}')">${t}</button>`
    ).join("")}
  </div>
  `;
}

function switchTab(tab){
  state.tab = tab;
  renderResult();
}

function renderResult(){
  const {vals, types} = state.result;

  app.innerHTML = `
  <h2>${types.join(" / ")}</h2>
  ${renderTabs()}
  <div class="tabContent">
    ${renderTabContent()}
  </div>
  <button onclick="restart()">Restart</button>
  `;

  enableSwipe();
}

function renderTabContent(){
  const {vals, types} = state.result;

  if(state.tab==="Core"){
    return `
    <h3>${types[0]}</h3>
    <p>${coreDefinition(types[0])}</p>
    `;
  }

  if(state.tab==="Secondary"){
    if(types.length>1){
      return `
      <h3>${types[1]}</h3>
      <p>${coreDefinition(types[1])}</p>
      `;
    }
    return "<p>No strong secondary influence.</p>";
  }

  if(state.tab==="Blend"){
    return `
    <h3>Blend Dynamics</h3>
    <p>${blendDefinition(types)}</p>
    `;
  }

  if(state.tab==="Compatibility"){
    if(state.personA){
      const percent = compatibilityScore(state.personA, types);
      return `
      <h3>${percent}% Match</h3>
      <p>${compatibilityExplanation(percent)}</p>
      `;
    } else {
      return `<button onclick="savePersonA()">Compare With Someone</button>`;
    }
  }
}

function savePersonA(){
  state.personA = state.result.types;
  restart(true);
}

function restart(second=false){
  state.score = {Red:0,Yellow:0,Green:0,Blue:0};
  state.index = 0;
  state.result = null;
  if(second){
    app.innerHTML = `<h2>Person B</h2><button onclick="renderQuestion()">Start</button>`;
  } else {
    renderQuestion();
  }
}

function compatibilityScore(a,b){
  let score=50;
  if(a[0]===b[0]) score+=10;
  if(a.includes("Green") && b.includes("Red")) score+=15;
  if(a.includes("Blue") && b.includes("Yellow")) score+=15;
  return Math.max(10,Math.min(100,score));
}

function compatibilityExplanation(p){
  if(p>80) return "Strong natural harmony and balanced energy.";
  if(p>60) return "Good compatibility with growth potential.";
  if(p>40) return "Workable but requires communication.";
  return "High friction dynamic — strong personalities may clash.";
}

function coreDefinition(color){
  const defs = {
    Red: "Driven, decisive, action-focused leaders who value results.",
    Yellow: "Expressive, enthusiastic connectors who value fun and recognition.",
    Green: "Calm, loyal stabilizers who value harmony and security.",
    Blue: "Analytical, structured thinkers who value precision and logic."
  };
  return defs[color];
}

function blendDefinition(types){
  return `This blend combines ${types.join(" and ")} creating a layered personality dynamic balancing strengths and tensions internally.`;
}

function enableSwipe(){
  let startX = null;
  const content = document.querySelector(".tabContent");

  content.addEventListener("touchstart",e=>{
    startX = e.changedTouches[0].screenX;
  });

  content.addEventListener("touchend",e=>{
    const endX = e.changedTouches[0].screenX;
    if(startX - endX > 50) nextTab();
    if(endX - startX > 50) prevTab();
  });
}

function nextTab(){
  const tabs=["Core","Secondary","Blend","Compatibility"];
  let i=tabs.indexOf(state.tab);
  state.tab=tabs[(i+1)%tabs.length];
  renderResult();
}

function prevTab(){
  const tabs=["Core","Secondary","Blend","Compatibility"];
  let i=tabs.indexOf(state.tab);
  state.tab=tabs[(i-1+tabs.length)%tabs.length];
  renderResult();
}

renderQuestion();
</script>
</body>
</html>
